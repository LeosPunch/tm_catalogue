<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trackmania Maps</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="maps.js"></script>
</head>

<body class="bg-slate-950 text-white font-sans">

<header class="border-b border-slate-800">
<div class="max-w-7xl mx-auto px-8 py-4 flex items-center justify-between">

<h1 id="title" class="text-xl font-bold tracking-wide"></h1>

<div class="flex items-center gap-10 text-xl font-bold">

<a href="index.html" class="hover:text-green-400 transition">
Home
</a>

<div class="relative group">

<div class="cursor-pointer hover:text-green-400">
Map Packs
</div>

<div class="absolute right-0 top-full pt-2">

<div id="dropdown"
class="w-56 bg-slate-900 border border-slate-700 rounded-lg shadow-xl opacity-0 invisible group-hover:visible group-hover:opacity-100 transition">

</div>

</div>

</div>

</div>
</header>

<div id="maps"></div>

<footer class="border-t border-slate-800 mt-20">
<div class="max-w-7xl mx-auto px-8 py-8 text-slate-400 text-sm">
© Leo`s Punch
</div>
</footer>

<script>

const params = new URLSearchParams(window.location.search);
const category = params.get("cat");

const data = mapData[category];

const dropdown = document.getElementById("dropdown");

Object.entries(mapData).forEach(([key,data]) => {

const link = document.createElement("a");

link.href = `maps.html?cat=${key}`;

link.className =
"block px-4 py-2 hover:bg-slate-800";

link.textContent = data.title;

dropdown.appendChild(link);

});

document.getElementById("title").textContent = data.title;

const maps = data.maps;

maps.sort((a,b)=>b.tmx-a.tmx);

const container = document.getElementById("maps");

maps.forEach((map,index)=>{

const reversed = index % 2 === 1;

const text = `
<div>

<h2 class="text-5xl font-bold mb-6">
${map.name}
</h2>

<div class="flex gap-4">

<a href="https://trackmania.exchange/mapshow/${map.tmx}"
class="bg-green-500 hover:bg-green-400 text-black font-semibold px-6 py-3 rounded-lg shadow-lg">
tmx
</a>

<a href="https://trackmania.io/#/leaderboard/${map.uid}"
class="bg-blue-500 hover:bg-blue-400 text-black font-semibold px-6 py-3 rounded-lg">
tm.io
</a>

<a href="https://trackmania.exchange/mapgbx/${map.tmx}"
class="border border-slate-600 hover:border-white px-6 py-3 rounded-lg">
download
</a>

</div>

</div>
`;

const image = `
<div class="flex justify-center">
<img src="https://trackmania.exchange/mapthumb/${map.tmx}"
class="rounded-xl shadow-2xl w-[520px]">
</div>
`;

const section = document.createElement("section");

section.className =
"max-w-7xl mx-auto px-8 py-20 grid grid-cols-2 gap-16 items-center";

section.innerHTML = reversed ? image + text : text + image;

container.appendChild(section);

});

</script>

</body>
</html>
