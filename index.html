<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leo's Punch Trackmania Catalogue</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white font-sans">

<header class="border-b border-slate-800">
<div class="max-w-7xl mx-auto px-8 py-4">

<h1 class="text-xl font-bold tracking-wide">
Leo`s Punch Trackmania Maps
</h1>

</div>
</header>

<div id="categories"></div>

<footer class="border-t border-slate-800 mt-20">
<div class="max-w-7xl mx-auto px-8 py-8 text-slate-400 text-sm">
© Leo`s Punch
</div>
</footer>

<script>

const categories = [

{
title:"Ditchfest",
link:"ditchfest.html",
image:"https://download.dashmap.live/3b6a6355-5da4-4fe7-85fe-0ee7a5c4c138/large.png"
},

{
title:"Weekly Shorts",
link:"ws.html",
image:"https://download.dashmap.live/3b6a6355-5da4-4fe7-85fe-0ee7a5c4c138/ws.png"
},

{
title:"Mowam Shorts",
link:"mwms.html",
image:"https://download.dashmap.live/3b6a6355-5da4-4fe7-85fe-0ee7a5c4c138/mwms.png"
},

{
title:"Weekly Wheel",
link:"ww.html",
image:"https://download.dashmap.live/3b6a6355-5da4-4fe7-85fe-0ee7a5c4c138/ww.png"
}

];

const container = document.getElementById("categories");

categories.forEach((cat,index)=>{

const reversed = index % 2 === 1;

const text = `
<div>

<a href="${cat.link}"
class="text-5xl font-bold hover:text-green-400 transition">

${cat.title}

</a>

</div>
`;

const image = `
<div class="flex justify-center">

<a href="${cat.link}">

<img src="${cat.image}"
class="rounded-xl shadow-2xl border border-slate-700 w-[520px] hover:scale-105 transition">

</a>

</div>
`;

const section = document.createElement("section");

section.className =
"max-w-7xl mx-auto px-8 py-20 grid grid-cols-2 gap-16 items-center";

section.innerHTML = reversed ? image + text : text + image;

container.appendChild(section);

});

</script>

</body>
</html>
