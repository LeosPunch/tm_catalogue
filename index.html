<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leo's Punch Trackmania Maps</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="maps.js"></script>
</head>

<body class="bg-slate-950 text-white font-sans">

<header class="border-b border-slate-800">
<div class="max-w-7xl mx-auto px-8 py-4">
<h1 class="text-xl font-bold tracking-wide">
Leo`s Punch Trackmania Maps
</h1>
</div>
</header>

<div id="categories"></div>

<footer class="border-t border-slate-800 mt-20">
<div class="max-w-7xl mx-auto px-8 py-8 text-slate-400 text-sm">
© Leo`s Punch
</div>
</footer>

<script>

const container = document.getElementById("categories");

Object.entries(mapData).forEach(([key,data],index)=>{

const reversed = index % 2 === 1;

const text = `
<div>
<a href="maps.html?cat=${key}" class="text-5xl font-bold hover:text-green-400 transition">
${data.title}
</a>
</div>
`;

const image = `
<div class="flex justify-center">
<a href="maps.html?cat=${key}">
<img src="${data.image}" class="rounded-xl shadow-2xl w-[520px] hover:scale-105 transition">
</a>
</div>
`;

const section = document.createElement("section");

section.className =
"max-w-7xl mx-auto px-8 py-20 grid grid-cols-2 gap-16 items-center";

section.innerHTML = reversed ? image + text : text + image;

container.appendChild(section);

});

</script>

</body>
</html>
