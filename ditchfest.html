<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trackmania Maps</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white font-sans">

<header class="border-b border-slate-800">
<div class="max-w-7xl mx-auto px-8 py-4 flex items-center gap-3">

<h1 class="text-xl font-bold tracking-wide">
Leo`s Punch Ditchfest Maps
</h1>

</div>
</header>

<div id="maps"></div>

<footer class="border-t border-slate-800 mt-20">
<div class="max-w-7xl mx-auto px-8 py-8 text-slate-400 text-sm flex justify-between">
<p>© Leo`s Punch</p>
</div>
</footer>

<script>

const maps = [
  { tmx:287893, uid:"i7fiiSzZIlxdjoVaQdcdoKfBwTa", name:"DF114 - Restricted Pool" },
  { tmx:297260, uid:"fUwsGXyoEX4lekHMokalenVj034", name:"DF117 - Straight PF map" },
  { tmx:293767, uid:"Z6907M4ga_LSkTq0RuVsSbTrjG3", name:"DF116 - Затонувший Курорт Богов Скорости" },
  { tmx:280725, uid:"KeAc4n63BNGSxO6h4ut0Kd7N_wb", name:"DF111 SlideScroller" },
  { tmx:283154, uid:"oOSCyjyPCSdVspORqTOOJ8iLzId", name:"DF112 - ENGINE REDy" },
  { tmx:285882, uid:"JZeIYjg7zkD3XIu_aRtev8Pvr9a", name:"DF113 - R U WANNA BUILD A SNOWMAN" },
  { tmx:290462, uid:"oWaCGJuV6O19bWiQmAdvTcQQlc9", name:"DF115 My First Map" }, 
  { tmx:285881, uid:"9q6kdND57eiSbahVc1bLWf_rx9g", name:"DF113 - Dress The Tree" },
  { tmx:300579, uid:"qIfIUBeM21nyGbY9VUkkHJaAr5", name:"DF 118 - DF118" },
  { tmx:300580, uid:"YQMmgF5GEJWApBZnvAeYk6bqS14", name:"DF118 - 3 - NadeoStyle PuzzleMapping" },
  { tmx:300581, uid:"FA6jNzldki68dRGWdLMHddXDyN6", name:"DF 118 - Grand Enduro" },
  { tmx:300582, uid:"TmienlQNmzataanQ9M_4fOZ0_jk", name:"DF118 allmaps allcars allteach allditch" },
];

maps.sort((a,b) => b.tmx - a.tmx);

const container = document.getElementById("maps");

maps.forEach((map,index)=>{

  const reversed = index % 2 === 1;

  let subtitle = "Trackmania map";

  if(map.name.startsWith("DF")){
    subtitle = "ditchfest";
  }

  const text = `
  <div>

  <h2 class="text-5xl font-bold mb-6">
  ${map.name}
  </h2>

  <p class="text-slate-400 text-lg mb-10">
  ${subtitle}
  </p>

  <div class="flex gap-4">

  <a href="https://trackmania.exchange/mapshow/${map.tmx}"
  class="bg-green-500 hover:bg-green-400 text-black font-semibold px-6 py-3 rounded-lg shadow-lg">
  tmx
  </a>

  <a href="https://trackmania.io/#/leaderboard/${map.uid}"
  class="bg-blue-500 hover:bg-blue-400 text-black font-semibold px-6 py-3 rounded-lg">
  tm.io
  </a>

  <a href="https://trackmania.exchange/mapgbx/${map.tmx}"
  class="border border-slate-600 hover:border-white px-6 py-3 rounded-lg">
  download
  </a>

  </div>

  </div>
  `;

  const image = `
  <div class="flex justify-center">
  <img src="https://trackmania.exchange/mapthumb/${map.tmx}"
  class="rounded-xl shadow-2xl border border-slate-700 w-[520px]">
  </div>
  `;

  const section = document.createElement("section");

  section.className =
  "max-w-7xl mx-auto px-8 py-20 grid grid-cols-2 gap-16 items-center";

  section.innerHTML = reversed ? image + text : text + image;

  container.appendChild(section);

});

</script>

</body>

</html>
